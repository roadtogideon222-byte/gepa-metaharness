site_name: metaharness
site_description: Filesystem first harness optimization for agentic coding systems and coding tool users.
theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: lime
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  font: false
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Providers: providers.md
  - Benchmarks: benchmarks.md
  - CLI Reference: cli-reference.md
  - Experiments: experiments.md
extra_css:
  - stylesheets/extra.css
