name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync --frozen
      - name: Compile
        run: uv run python -m py_compile $(find src tests examples -name '*.py' | sort)
      - name: Unit tests
        run: uv run python -m unittest discover -s tests -v

  benchmarks:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync --frozen
      - name: Ticket router fake smoke
        run: uv run python examples/ticket_router/run.py --backend fake --budget 1
      - name: Python fixture benchmark fake smoke
        run: uv run metaharness run examples/python_fixture_benchmark --backend fake --budget 1 --run-name ci-fixture
      - name: Python CLI benchmark fake smoke
        run: uv run metaharness run examples/python_cli_benchmark --backend fake --budget 1 --run-name ci-cli

  docs:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync docs dependencies
        run: uv sync --frozen --group dev
      - name: Build docs
        run: uv run mkdocs build --strict

  package:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync --frozen
      - name: CLI smoke
        run: uv run metaharness --help
      - name: Build distributions
        run: uv build
